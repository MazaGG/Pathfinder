name: Analyze Results

on:
  repository_dispatch:
    types: [run-analysis]

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip
          pip3 install matplotlib numpy

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: result-*
          path: artifacts
          merge-multiple: true

      - name: Collect summaries
        run: |
          mkdir -p collected
          find artifacts -name "_summary.csv" -exec cp {} collected/ \;
          python3 scripts/collect_summaries.py

      - name: Plot analysis
        run: python3 scripts/plot_analysis.py

      - name: Upload analysis
        uses: actions/upload-artifact@v4
        with:
          name: analysis-results
          path: |
            analysis_plot.png
            collected/combined_summary.csv