name: Analyze Results

on:
  workflow_run:
    workflows: ["Benchmark"]
    types:
      - completed

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip
          pip3 install matplotlib numpy

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: result-*
          path: artifacts
          merge-multiple: true

      - name: Debug - list files
        run: |
          echo "Files in artifacts:"
          find artifacts -type f | head -50

      - name: Collect summaries
        run: python3 scripts/collect_summaries.py

      - name: Plot analysis
        run: python3 scripts/plot_analysis.py

      - name: Upload analysis
        uses: actions/upload-artifact@v4
        with:
          name: analysis-results
          path: |
            analysis_plot.png
            collected/combined_summary.csv